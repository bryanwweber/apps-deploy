name: Mirror GitHub Repos to Forgejo

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/mirror-repos.yaml"
      - "forgejo/sync-github-repos.py"
  schedule:
    - cron: "17 2 3 * *"

permissions: {}

jobs:
  mirror-repos:
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:github-actions
          ping: ${{ vars.HETZNER_HOST }}
      - name: Mirror repos
        run: uv run forgejo/sync-github-repos.py --host-url "$HOST_URL"
        env:
          FORGEJO_API_KEY: ${{ secrets.FORGEJO_API_KEY }}
          GH_AUTH_TOKEN: ${{ secrets.GH_AUTH_TOKEN }}
          HOST_URL: ${{ vars.FORGEJO_HOST }}
