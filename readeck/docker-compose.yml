services:
  ts-readeck:
    image: ghcr.io/tailscale/tailscale:${TAILSCALE_VERSION}
    hostname: readeck
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}?ephemeral=false
      - TS_EXTRA_ARGS=--advertise-tags=tag:readeck
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-data-readeck:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD-SHELL", "tailscale status"]
      interval: 1s
      timeout: 5s
      retries: 60
    restart: unless-stopped
  readeck:
    image: codeberg.org/readeck/readeck:${READECK_VERSION}
    restart: unless-stopped
    network_mode: service:ts-readeck
    volumes:
      - readeck-data:/readeck
    healthcheck:
      test: ["CMD", "/bin/readeck", "healthcheck", "-config", "config.toml"]
      interval: 30s
      timeout: 2s
      retries: 3
    environment:
      READECK_DATABASE_SOURCE: "postgres://${READECK_DB_USERNAME}:${READECK_DB_PASSWORD}@localhost:5432/${READECK_DB_NAME}"
      READECK_LOG_LEVEL: info
      READECK_SERVER_HOST: "0.0.0.0"
      READECK_SERVER_PORT: 8000
      READECK_LOG_FORMAT: text
    depends_on:
      ts-readeck:
        condition: service_healthy
      readeck-db:
        condition: service_healthy
        restart: true
  readeck-db:
    image: postgres:${POSTGRES_VERSION}
    container_name: readeck-db
    network_mode: service:ts-readeck
    environment:
      POSTGRES_DB: ${READECK_DB_NAME}
      POSTGRES_USER: ${READECK_DB_USERNAME}
      POSTGRES_PASSWORD: ${READECK_DB_PASSWORD}
    volumes:
      - readeck-db:/var/lib/postgresql/
    restart: unless-stopped
    depends_on:
      ts-readeck:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 60s
      retries: 5
      start_period: 80s
volumes:
  readeck-data:
    name: readeck_data
    external: true
  readeck-db:
    name: readeck_db
    external: true
  tailscale-data-readeck:
    name: tailscale-data-readeck
